openapi: 3.1.0
info:
  title: Google Cloud API
  description: >-
    The Google Cloud API provides programmatic access to Google Cloud Platform services including compute, storage, networking, machine learning, and data analytics. Developers can provision resources, manage infrastructure, and integrate GCP services into their applications.
  version: '1.0'
  contact:
    name: Alphabet Developer Support
    url: https://cloud.google.com/apis/docs/overview
externalDocs:
  description: Documentation
  url: https://cloud.google.com/apis/docs/overview
servers:
  - url: https://cloud.google.com/apis
    description: Production
tags:
  - name: Cloud
    description: Cloud operations
security:
  - bearerAuth: []
paths:
  /status:
    get:
      operationId: getStatus
      summary: Get API status
      description: >-
        Returns the current status of the API.
      tags:
        - Cloud
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
        '401':
          description: Unauthorized
        '429':
          description: Too many requests
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
